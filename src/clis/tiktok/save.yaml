site: tiktok
name: save
description: Add a TikTok video to Favorites
domain: www.tiktok.com

args:
  url:
    type: str
    required: true
    positional: true
    description: TikTok video URL

pipeline:
  - navigate:
      url: ${{ args.url }}
      settleMs: 6000

  - evaluate: |
      (async () => {
        const url = ${{ args.url | json }};
        const btn = document.querySelector('[data-e2e="undefined-icon"]');
        if (!btn) throw new Error('Favorites button not found');
        const container = btn.closest('button') || btn.closest('[role="button"]') || btn;
        const aria = container.getAttribute('aria-label') || '';
        if (aria.includes('Remove from Favorites')) {
          return [{ status: 'Already in Favorites', url: url }];
        }
        container.click();
        await new Promise(r => setTimeout(r, 2000));
        return [{ status: 'Added to Favorites', url: url }];
      })()

columns: [status, url]
